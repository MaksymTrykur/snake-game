namespace: snake-game

mongodb:
  defines: runnable
  inherits: mongodb/mongodb

mongodb-staging:
  defines: digitalocean-database/database
  name: snake-game-staging-fra1
  engine: mongodb
  version: "7"
  region: fra1
  size: db-s-1vcpu-1gb
  num_nodes: 1
  services:
    default:
      protocol: custom

mongodb-prod:
  defines: digitalocean-database/database
  name: snake-game-prod-fra1
  engine: mongodb
  version: "7"
  region: fra1
  size: db-s-1vcpu-1gb
  num_nodes: 1
  services:
    default:
      protocol: custom

snake-game-base:
  defines: runnable
  containers:
    app:
      image: snake-game:latest
  services:
    http:
      container: app
      port: 3001
      protocol: tcp

snake-game-local:
  defines: runnable
  inherits: snake-game/snake-game-base
  connections:
    mongodb:
      target: snake-game/mongodb
      service: mongodb
  depends:
    wait-for:
      runnables:
        - snake-game/mongodb
      timeout: 120
  variables:
    db-host:
      type: string
      value: <- connection-hostname("mongodb")
    db-port:
      type: int
      value: <- connection-port("mongodb")
    db-name:
      type: string
      value: snakegame-local
    db-user:
      type: string
      value: mongo
    db-password:
      type: string
      value: password
    db-conn:
      type: string
      env: DB_CONN
      value: <- `mongodb://${db-user}:${db-password}@${db-host}:${db-port}/${db-name}?authSource=admin`
    mongodb-uri:
      type: string
      env: MONGODB_URI
      value: <- `mongodb://${db-user}:${db-password}@${db-host}:${db-port}/${db-name}?authSource=admin`

snake-game-staging:
  defines: runnable
  inherits: snake-game/snake-game-base
  services:
    http:
      container: app
      port: 3001
      protocol: tcp
      ingress-routes:
        web:
          path-prefix: /staging
          path-rewrite:
            regex: "^/staging/?(.*)"
            to: "/$1"
  connections:
    mongodb:
      target: snake-game/mongodb-staging
      service: default
  depends:
    wait-for:
      runnables:
        - snake-game/mongodb-staging
      timeout: 120
  variables:
    db-host:
      type: string
      value: <- connection-target("mongodb") entity-state get-member("host")
    db-port:
      type: int
      value: <- connection-target("mongodb") entity-state get-member("port")
    db-name:
      type: string
      value: snakegame-staging
    db-user:
      type: string
      value: <- connection-target("mongodb") entity-state get-member("user")
    db-password:
      type: string
      value: <- connection-target("mongodb") entity-state get-member("password")
    db-conn:
      type: string
      env: DB_CONN
      value: <- `mongodb://${db-user}:${db-password}@${db-host}:${db-port}/${db-name}?authSource=admin&tls=true`
    mongodb-uri:
      type: string
      env: MONGODB_URI
      value: <- `mongodb://${db-user}:${db-password}@${db-host}:${db-port}/${db-name}?authSource=admin&tls=true`
  scale:
    value: 1

snake-game-prod:
  defines: runnable
  inherits: snake-game/snake-game-base
  services:
    http:
      container: app
      port: 3001
      protocol: tcp
      ingress-routes:
        web:
          path-prefix: /prod
          path-rewrite:
            regex: "^/prod/?(.*)"
            to: "/$1"
  connections:
    mongodb:
      target: snake-game/mongodb-prod
      service: default
  depends:
    wait-for:
      runnables:
        - snake-game/mongodb-prod
      timeout: 120
  variables:
    db-host:
      type: string
      value: <- connection-target("mongodb") entity-state get-member("host")
    db-port:
      type: int
      value: <- connection-target("mongodb") entity-state get-member("port")
    db-name:
      type: string
      value: snakegame-prod
    db-user:
      type: string
      value: <- connection-target("mongodb") entity-state get-member("user")
    db-password:
      type: string
      value: <- connection-target("mongodb") entity-state get-member("password")
    db-conn:
      type: string
      env: DB_CONN
      value: <- `mongodb://${db-user}:${db-password}@${db-host}:${db-port}/${db-name}?authSource=admin&tls=true`
    mongodb-uri:
      type: string
      env: MONGODB_URI
      value: <- `mongodb://${db-user}:${db-password}@${db-host}:${db-port}/${db-name}?authSource=admin&tls=true`
  scale:
    value: 2

endpoints-staging:
  defines: monkec/endpoints
  entrypoint: staging
  depends:
    wait-for:
      runnables:
        - snake-game/snake-game-staging
      timeout: 120
  connections:
    staging:
      target: snake-game/snake-game-staging
      service: http
  endpoints:
    staging:
      url: <- "https://" connection-domain-name("staging") "/staging" concat-all
      description: Staging snake-game URL

endpoints-prod:
  defines: monkec/endpoints
  entrypoint: prod
  depends:
    wait-for:
      runnables:
        - snake-game/snake-game-prod
      timeout: 120
  connections:
    prod:
      target: snake-game/snake-game-prod
      service: http
  endpoints:
    prod:
      url: <- "https://" connection-domain-name("prod") "/prod" concat-all
      description: Production snake-game URL

local:
  defines: group
  members:
    - snake-game/mongodb
    - snake-game/snake-game-local

staging:
  defines: group
  members:
    - snake-game/mongodb-staging
    - snake-game/snake-game-staging
    - snake-game/endpoints-staging

prod:
  defines: group
  members:
    - snake-game/mongodb-prod
    - snake-game/snake-game-prod
    - snake-game/endpoints-prod
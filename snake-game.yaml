namespace: snake-game

mongodb:
  defines: runnable
  containers:
    mongodb:
      image: mongo:7
  variables:
    mongo-init-database:
      type: string
      value: snakegame
      env: MONGO_INITDB_DATABASE
    mongo-init-username:
      type: string
      value: snakegame-admin
      env: MONGO_INITDB_ROOT_USERNAME
    mongo-init-password:
      type: string
      value: <- secret("mongodb-root-password")
      env: MONGO_INITDB_ROOT_PASSWORD
  permitted-secrets:
    mongodb-root-password: true
  services:
    mongodb:
      container: mongodb
      port: 27017
      protocol: tcp
  checks:
    readiness:
      code: tcp-check-service("snake-game/mongodb", "mongodb")
      period: 10
      initialDelay: 10
    liveness:
      code: tcp-check-service("snake-game/mongodb", "mongodb")
      period: 30
      initialDelay: 20

app:
  defines: runnable
  containers:
    app:
      image: snake-game:latest
  services:
    http:
      container: app
      port: 3001
      protocol: tcp
      ingress-routes:
        web:
          path-prefix: /
  connections:
    mongodb:
      target: snake-game/mongodb
      service: mongodb
  depends:
    wait-for:
      runnables:
        - snake-game/mongodb
      timeout: 180
  variables:
    node-env:
      type: string
      value: production
      env: NODE_ENV
    db-conn:
      type: string
      value: >-
        <- "mongodb://" "snakegame-admin" ":" secret("mongodb-root-password") "@"
        connection-hostname("mongodb") ":" connection-port("mongodb") "/snakegame?authSource=admin"
        concat-all
      env: DB_CONN
  permitted-secrets:
    mongodb-root-password: true
  checks:
    readiness:
      code: http-get-service("snake-game/app", "http", "/") get-member("status") 200 eq?
      period: 10
      initialDelay: 15
    liveness:
      code: http-get-service("snake-game/app", "http", "/") get-member("status") 200 eq?
      period: 30
      initialDelay: 20

endpoints:
  defines: monkec/endpoints
  entrypoint: app
  endpoints:
    app:
      description: Public HTTPS URL for the snake-game web application.
      url: <- "https://" connection-domain-name("app") concat-all
  connections:
    app:
      target: snake-game/app
      service: http
  depends:
    wait-for:
      runnables:
        - snake-game/app
      timeout: 180

stack:
  defines: group
  members:
    - snake-game/mongodb
    - snake-game/app
    - snake-game/endpoints